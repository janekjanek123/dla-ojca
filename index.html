<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Człowiek o wielu twarzach — Papcio</title>
  <meta name="description" content="Dzień Ojca. Człowiek o wielu twarzach — Piotr „Papcio" Jędrach." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800&display=swap&subset=latin,latin-ext" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Loader -->
  <div class="loader" id="loader" aria-hidden="true">
    <div class="loader__inner">
      <span class="loader__word">PAPCIO</span>
      <span class="loader__bar"><i></i></span>
    </div>
  </div>

  <!-- The pinned cinematic experience -->
  <div class="experience" id="experience">
    <section class="stage" id="stage" aria-label="Człowiek o wielu twarzach">
      <div class="bg" id="bg"></div>
      <div class="vignette" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <div class="scene" id="scene">
        <div class="cards" id="cards"></div>
      </div>

      <div class="words" id="words"></div>

      <div class="hud">
        <div class="hud__label" id="hudLabel"></div>
        <div class="hud__counter" id="hudCounter"></div>
      </div>

      <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>

      <div class="scrollhint" id="scrollHint" aria-hidden="true">
        <span>przewiń</span>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </div>

      <button class="giftcue" id="giftCue" type="button">
        <span>odbierz prezent</span>
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </button>
    </section>
  </div>

  <!-- Gift -->
  <section class="gift" id="gift" aria-label="Prezent">
    <div class="gift__halo" aria-hidden="true"></div>
    <header class="gift__head">
      <p class="gift__eyebrow" id="giftEyebrow">Prezent dla Papcia</p>
      <h2 class="gift__title">Złap go, jeśli zdołasz</h2>
      <p class="gift__sub" id="giftHint">Prezent wzbrania się przed kursorem… jeszcze <b id="countdown">30</b>s</p>
    </header>

    <div class="gift__field" id="giftField">
      <!-- tiny runaway frame -->
      <button class="chase" id="giftChase" type="button" disabled aria-label="Odsłoń prezent">
        <span class="chase__peek" aria-hidden="true"><i></i><i></i></span>
        <span class="chase__label">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
          <span>odsłoń prezent</span>
        </span>
      </button>

      <!-- full prize, revealed after the catch -->
      <div class="prize" id="prize" aria-hidden="true">
        <div class="tickets" id="tickets"></div>
        <div class="gift__done" id="giftDone">
          <h3>Wszystkiego najlepszego, Papciu!</h3>
          <p>Dwa bilety na Polonię. Reszta meczu jest na Ciebie. 🤍🖤</p>
        </div>
      </div>
    </div>

    <canvas class="confetti" id="confetti" aria-hidden="true"></canvas>
  </section>

  <script src="libs/gsap.min.js"></script>
  <script src="libs/ScrollTrigger.min.js"></script>
  <script src="libs/lenis.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
